services:
  - type: web
    name: dispatched-intake
    runtime: node
    plan: starter
    # Build runs IndexNow submission as a post-step. The `|| true` guard
    # ensures an IndexNow failure (network blip, key file race) cannot
    # fail the production deploy.
    buildCommand: npm ci && npm run build && (npm run indexnow:submit || true)
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_TELEMETRY_DISABLED
        value: 1
      - key: NEXT_PUBLIC_LENDFLOW_WIDGET_SCRIPT_SRC
        sync: false
      - key: LENDFLOW_WEBHOOK_SECRET
        sync: false
      # IndexNow auto-submit. Generate key with: openssl rand -hex 16
      # Mark INDEXNOW_KEY as secret in the Render dashboard. After setting,
      # also drop public/<KEY>.txt containing exactly the key string.
      - key: INDEXNOW_KEY
        sync: false
      - key: INDEXNOW_HOST
        value: dispatched.finance
      # PostHog product analytics → shared Mainline PostHog project (US,
      # project 428185). Both values are publishable / client-side safe,
      # so they're committed here rather than set as dashboard secrets.
      - key: NEXT_PUBLIC_POSTHOG_KEY
        value: phc_o5qp8URU8jp3hTPVGWkuABjdGKjpiHstuxqSvh39w5Uc
      - key: NEXT_PUBLIC_POSTHOG_HOST
        value: https://us.i.posthog.com
      # Bearer token guarding /api/cron/indexnow. MUST be set to the same
      # value here AND on the indexnow-ping cron job below. Generate with:
      # openssl rand -hex 32
      - key: CRON_SECRET
        sync: false
      # Bearer secret used by proxy.ts to forward crawler hits to the
      # Mainline analytics ingest endpoint. Operator shares the value
      # out-of-band; set it in the Render dashboard. Missing value → the
      # beacon helper short-circuits to a no-op (no crash, no reporting).
      - key: MAINLINE_INGEST_SECRET
        sync: false
      # EIA Open Data API key — gates /api/cron/pulse-diesel. The free
      # public series we use does not technically require a key, but
      # the v2 endpoint expects api_key on every request. Provision a
      # key at https://www.eia.gov/opendata/register.php and set this
      # value as a Render dashboard secret (sync: false).
      - key: EIA_API_KEY
        sync: false
      # Pulse snapshot persistence root. Points at the mounted Render
      # Disk in production so weekly snapshots survive container
      # restarts; defaults to lib/data/intel/snapshots in repo when
      # unset (dev / preview / fallback).
      - key: PULSE_SNAPSHOTS_DIR
        value: /var/data/intel-snapshots
      # Injected from the Render dashboard when real backends come online:
      # NEXT_PUBLIC_SITE_URL
      # GOOGLE_SITE_VERIFICATION
      # BING_SITE_VERIFICATION
      # SENTRY_DSN
      # DATABASE_URL
    autoDeploy: true
    healthCheckPath: /healthz
    disk:
      name: intel-snapshots
      mountPath: /var/data/intel-snapshots
      sizeGB: 1

  # Cron-driven IndexNow re-ping. The post-build script in the web service
  # already submits on every deploy; this job re-submits every 6 hours so
  # editorial sitemap changes (new programmatic city, new article) get
  # picked up by Bing/Yandex/Yep/Naver/Seznam without waiting for the next
  # deploy. The route is auth-gated by CRON_SECRET — same value must be
  # set on the web service AND on this cron job in the Render dashboard.
  #
  # `|| echo` keeps the cron exit code zero on transient failures so a
  # bad ping doesn't pollute the cron-job alert history. Real failures
  # still surface in Render request logs from the route's console.error.
  - type: cron
    name: indexnow-ping
    runtime: node
    schedule: "0 */6 * * *"
    buildCommand: "true"
    startCommand: |
      curl -fsS -X POST "https://dispatched.finance/api/cron/indexnow" \
        -H "Authorization: Bearer $CRON_SECRET" \
        || echo "[indexnow-cron] ping failed (non-fatal)"
    envVars:
      - key: CRON_SECRET
        sync: false

  # Dispatched Pulse — diesel. Mondays at 18:00 UTC, after EIA publishes
  # the week's retail on-highway diesel survey (typically released Monday
  # afternoon ET). Same Bearer-CRON_SECRET auth model as indexnow-ping.
  # On failure the route returns 503 and the on-disk `latest.json` is NOT
  # overwritten — pages keep serving the previous good snapshot.
  - type: cron
    name: pulse-diesel
    runtime: node
    schedule: "0 18 * * 1"
    buildCommand: "true"
    startCommand: |
      curl -fsS -X POST "https://dispatched.finance/api/cron/pulse-diesel" \
        -H "Authorization: Bearer $CRON_SECRET" \
        || echo "[pulse-diesel-cron] fetch failed (non-fatal)"
    envVars:
      - key: CRON_SECRET
        sync: false
