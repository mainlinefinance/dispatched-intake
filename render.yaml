services:
  - type: web
    name: dispatched-intake
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_TELEMETRY_DISABLED
        value: 1
      - key: NEXT_PUBLIC_LENDFLOW_WIDGET_HOST
        value: https://sandbox-widget.lendflow.com
      - key: NEXT_PUBLIC_LENDFLOW_WIDGET_ENV_ID
        sync: false
      - key: NEXT_PUBLIC_LENDFLOW_WIDGET_BRANDING_ID
        sync: false
      - key: LENDFLOW_WEBHOOK_SECRET
        sync: false
      # Injected from the Render dashboard when real backends come online:
      # NEXT_PUBLIC_SITE_URL
      # SENTRY_DSN
      # DATABASE_URL
    autoDeploy: true
    healthCheckPath: /healthz
